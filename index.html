<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline Builder — by AD</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f8f7f4;
    --bg2:      #f0eeea;
    --bg3:      #e8e5df;
    --card:     #ffffff;
    --border:   #e0dbd0;
    --border2:  #c8c2b5;
    --text:     #1c1b18;
    --text2:    #6b6760;
    --text3:    #a8a49d;
    --accent:   #1c1b18;
    --sep:      #e0dbd0;
  }
  .dark {
    --bg:       #121212;
    --bg2:      #1a1a1a;
    --bg3:      #222222;
    --card:     #1a1a1a;
    --border:   #2e2e2e;
    --border2:  #444444;
    --text:     #f0ede8;
    --text2:    #8a8680;
    --text3:    #555050;
    --accent:   #f0ede8;
    --sep:      #2a2a2a;
  }

  html { font-size: 16px; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.25s, color 0.25s;
  }

  /* ── Layout ── */
  .page {
    max-width: 860px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* ── Page header ── */
  .page-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.25rem;
  }
  .page-title {
    font-size: 1.05rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
  }
  .page-subtitle {
    font-size: 0.75rem;
    color: var(--text3);
    margin-top: 3px;
    font-family: 'SF Mono', 'Consolas', monospace;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 6px 14px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    background: transparent;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--bg3); border-color: var(--border2); }
  .btn.icon-only { padding: 6px 9px; }
  .btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  /* ── Timeline section ── */
  .tl-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 2rem; }

  .tl-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .tl-card:focus-within { border-color: var(--border2); }

  .tl-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px 10px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .tl-swatch {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .tl-name-input {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    border: none;
    background: transparent;
    color: var(--text);
    padding: 0;
    min-width: 120px;
    width: 180px;
    border-bottom: 1px solid transparent;
  }
  .tl-name-input:focus { outline: none; border-bottom-color: var(--border2); }

  .tl-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
    flex-wrap: wrap;
  }
  .count-field {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.75rem;
    color: var(--text2);
  }
  .count-field input {
    width: 40px;
    text-align: center;
    font-family: 'SF Mono', 'Consolas', monospace;
    font-size: 0.75rem;
    padding: 3px 5px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--bg2);
    color: var(--text);
  }
  .count-field input:focus { outline: none; border-color: var(--border2); }

  .color-row {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .cdot {
    width: 16px; height: 16px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s;
    flex-shrink: 0;
  }
  .cdot.on { border-color: var(--text); transform: scale(1.2); }

  .del-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text3);
    padding: 4px;
    border-radius: 5px;
    display: flex; align-items: center;
    transition: color 0.15s, background 0.15s;
  }
  .del-btn:hover { color: #c0392b; background: #fdecea; }
  .del-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* ── Node rows ── */
  .node-col-head {
    display: grid;
    grid-template-columns: 20px 1fr 160px auto;
    gap: 8px;
    padding: 6px 14px 4px;
    font-size: 0.7rem;
    color: var(--text3);
    font-family: 'SF Mono', 'Consolas', monospace;
    letter-spacing: 0.04em;
  }
  .node-rows { padding: 0 14px 12px; display: flex; flex-direction: column; gap: 5px; }
  .node-row {
    display: grid;
    grid-template-columns: 20px 1fr 160px auto;
    gap: 8px;
    align-items: center;
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: var(--bg2);
    cursor: default;
    transition: box-shadow 0.1s, opacity 0.1s;
  }
  .node-row.dragging { opacity: 0.3; }
  .node-row.drag-over { box-shadow: 0 -2px 0 0 #378ADD; }

  .drag-handle {
    cursor: grab;
    color: var(--text3);
    display: flex; align-items: center; justify-content: center;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; }

  .node-inp {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    font-size: 0.8rem;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--card);
    color: var(--text);
    width: 100%;
    transition: border-color 0.15s;
  }
  .node-inp:focus { outline: none; border-color: var(--border2); }
  .node-inp::placeholder { color: var(--text3); font-style: italic; }

  /* ── Add button row ── */
  .add-row {
    display: flex;
    justify-content: flex-start;
    margin-bottom: 2.5rem;
  }

  /* ── Preview section ── */
  .preview-section {
    border-top: 1px solid var(--sep);
    padding-top: 1.75rem;
  }
  .preview-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .preview-label {
    font-size: 0.7rem;
    font-family: 'SF Mono', 'Consolas', monospace;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
  }
  .preview-divider {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .preview-actions { display: flex; gap: 7px; }

  svg#preview-svg {
    width: 100%;
    overflow: visible;
    display: block;
  }

  /* ── Duplicate dropdown ── */
  .dup-wrap { position: relative; display: inline-block; }
  .dup-menu {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    min-width: 180px;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    z-index: 50;
    overflow: hidden;
  }
  .dup-menu.open { display: block; }
  .dup-menu-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    font-size: 0.8rem;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 260px;
  }
  .dup-menu-item:hover { background: var(--bg3); }
  .dup-menu-item .dup-swatch {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .dup-menu-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Edit hint ── */
  .edit-hint {
    font-size: 0.68rem;
    color: var(--text3);
    font-family: 'SF Mono','Consolas',monospace;
    margin-left: 4px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    white-space: nowrap;
  }
  .tl-card-header:hover .edit-hint { opacity: 1; }

  /* ── Footer ── */
  /* ── Footer ── */
  .footer {
    margin-top: 3rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.7rem;
    font-family: 'SF Mono', 'Consolas', monospace;
    color: var(--text3);
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(12px);
    background: var(--text);
    color: var(--bg);
    font-family: -apple-system, 'Segoe UI', sans-serif;
    font-size: 0.8rem;
    padding: 8px 18px;
    border-radius: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Share modal ── */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    width: min(520px, 92vw);
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .modal-title {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 0.5rem;
  }
  .modal-sub {
    font-size: 0.75rem;
    color: var(--text3);
    margin-bottom: 1rem;
    font-family: 'SF Mono', 'Consolas', monospace;
  }
  .share-url-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .share-url-input {
    flex: 1;
    font-family: 'SF Mono', 'Consolas', monospace;
    font-size: 0.72rem;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg2);
    color: var(--text2);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .modal-close {
    margin-top: 1rem;
    width: 100%;
    text-align: center;
    font-size: 0.8rem;
    color: var(--text3);
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    border: none;
    background: transparent;
    font-family: -apple-system, 'Segoe UI', sans-serif;
  }
  .modal-close:hover { background: var(--bg3); color: var(--text); }
</style>
</head>
<body>

<div class="page">

  <!-- Page Header -->
  <div class="page-header">
    <div>
      <div class="page-title">Timeline Builder</div>
      <div class="page-subtitle">多條時間軸編輯器 · by AD</div>
    </div>
    <div class="header-actions">
      <button class="btn icon-only" id="themeBtn" onclick="toggleTheme()" title="切換明暗主題" aria-label="切換主題">
        <svg id="themeIcon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>

  <!-- Timeline cards -->
  <div class="tl-list" id="tlList"></div>

  <!-- Add / Duplicate buttons -->
  <div class="add-row" id="addRow" style="gap:8px;flex-wrap:wrap;">
    <button class="btn" onclick="addTimeline()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      新增
    </button>
    <div class="dup-wrap" id="dupWrap">
      <button class="btn" id="dupBtn" onclick="toggleDupMenu(event)" style="display:none">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        複製
        <svg viewBox="0 0 24 24" style="width:12px;height:12px;margin-left:2px"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="dup-menu" id="dupMenu"></div>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-section">
    <div class="preview-header">
      <span class="preview-label">預覽</span>
      <div class="preview-divider"></div>
      <div class="preview-actions">
        <button class="btn" onclick="exportSVG()">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          SVG
        </button>
        <button class="btn" onclick="exportPNG()">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          PNG
        </button>
        <button class="btn" onclick="openShareModal()">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          分享
        </button>
      </div>
    </div>
    <svg id="preview-svg"></svg>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span>Timeline Builder</span>
    <span>made by AD</span>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Share Modal -->
<div class="modal-backdrop" id="shareModal" onclick="if(event.target===this)closeShareModal()">
  <div class="modal">
    <div class="modal-title">分享連結</div>
    <div class="modal-sub">此連結包含所有 Timeline 資料，對方開啟即可直接載入。</div>
    <div class="share-url-row">
      <input class="share-url-input" id="shareUrlInput" readonly>
      <button class="btn" onclick="copyShareUrl()">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        複製
      </button>
    </div>
    <button class="modal-close" onclick="closeShareModal()">關閉</button>
  </div>
</div>

<script>
const COLORS = ['#378ADD','#D85A30','#1D9E75','#BA7517','#993556'];
const CNAMES = ['藍','橘紅','綠','琥珀','玫瑰'];
let timelines = [], tlCount = 0;
let dragState = { tlId: null, fromIdx: null };
let isDark = false;

function toggleTheme() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  const icon = document.getElementById('themeIcon');
  icon.innerHTML = isDark
    ? '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    : '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  renderPreview();
}

function phLabel(ni, total) {
  if (ni === 0) return '起點';
  if (ni === total - 1) return '終點';
  return '里程碑 ' + ni;
}

function addTimeline(n = 4) {
  const id = ++tlCount;
  const ci = timelines.length % COLORS.length;
  const nodes = [];
  for (let i = 0; i < n; i++) nodes.push({ label: '', date: '', color: ci });
  timelines.push({ id, name: 'Timeline ' + id, nodes, colorIdx: ci });
  renderAll();
  updateDupMenu();
}

function removeTl(id) {
  timelines = timelines.filter(t => t.id !== id);
  renderAll();
  updateDupMenu();
}

function updateDupMenu() {
  const btn = document.getElementById('dupBtn');
  const menu = document.getElementById('dupMenu');
  if (!btn || !menu) return;
  btn.style.display = timelines.length >= 1 ? '' : 'none';
  menu.innerHTML = timelines.map(tl => `
    <div class="dup-menu-item" onclick="duplicateTimeline(${tl.id});closeDupMenu()">
      <div class="dup-swatch" style="background:${COLORS[tl.colorIdx]}"></div>
      <span class="dup-menu-label">${esc(tl.name)}</span>
    </div>`).join('');
}

function duplicateTimeline(id) {
  const src = timelines.find(t => t.id === id);
  if (!src) return;
  const newId = ++tlCount;
  const ci = (src.colorIdx + 1) % COLORS.length;
  const nodes = src.nodes.map(n => ({ label: n.label, date: n.date, color: ci }));
  timelines.push({ id: newId, name: src.name + ' 複製', nodes, colorIdx: ci });
  renderAll();
  updateDupMenu();
}

function toggleDupMenu(e) {
  e.stopPropagation();
  updateDupMenu();
  document.getElementById('dupMenu').classList.toggle('open');
}

function closeDupMenu() {
  document.getElementById('dupMenu').classList.remove('open');
}

document.addEventListener('click', () => closeDupMenu());

function changeNodeCount(id, v) {
  v = Math.max(2, Math.min(10, parseInt(v) || 2));
  const tl = timelines.find(t => t.id === id);
  if (!tl) return;
  while (tl.nodes.length < v) tl.nodes.push({ label: '', date: '', color: tl.colorIdx });
  if (tl.nodes.length > v) tl.nodes = tl.nodes.slice(0, v);
  renderAll();
}

function setTlColor(id, ci) {
  const tl = timelines.find(t => t.id === id);
  if (!tl) return;
  tl.colorIdx = ci;
  tl.nodes.forEach(n => n.color = ci);
  renderAll();
}

function setNode(id, ni, key, val) {
  const tl = timelines.find(t => t.id === id);
  if (tl && tl.nodes[ni]) tl.nodes[ni][key] = key === 'color' ? parseInt(val) : val;
  if (key === 'color') renderAll();
  else renderPreview();
}

function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }

function onDragStart(e, tlId, idx) {
  dragState = { tlId, fromIdx: idx };
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.closest('.node-row').classList.add('dragging'), 0);
}
function onDragEnd(e) {
  e.target.closest('.node-row')?.classList.remove('dragging');
  document.querySelectorAll('.node-row').forEach(r => r.classList.remove('drag-over'));
}
function onDragOver(e, tlId, idx) {
  e.preventDefault();
  if (dragState.tlId !== tlId) return;
  document.querySelectorAll('.node-row').forEach(r => r.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function onDrop(e, tlId, toIdx) {
  e.preventDefault();
  document.querySelectorAll('.node-row').forEach(r => r.classList.remove('drag-over'));
  if (dragState.tlId !== tlId || dragState.fromIdx === toIdx) return;
  const tl = timelines.find(t => t.id === tlId);
  if (!tl) return;
  const moved = tl.nodes.splice(dragState.fromIdx, 1)[0];
  tl.nodes.splice(toIdx, 0, moved);
  renderAll();
}

function renderAll() { renderEditor(); renderPreview(); }

function renderEditor() {
  const cont = document.getElementById('tlList');
  cont.innerHTML = '';
  timelines.forEach(tl => {
    const card = document.createElement('div');
    card.className = 'tl-card';
    let html = `
    <div class="tl-card-header">
      <div class="tl-swatch" style="background:${COLORS[tl.colorIdx]}"></div>
      <input class="tl-name-input" value="${esc(tl.name)}" placeholder="Timeline 名稱"
        oninput="timelines.find(t=>t.id==${tl.id}).name=this.value;renderPreview();updateDupMenu()">
      <span class="edit-hint">← 點擊可編輯</span>
      <div class="tl-controls">
        <div class="count-field">
          節點
          <input type="number" min="2" max="10" value="${tl.nodes.length}"
            onchange="changeNodeCount(${tl.id},this.value)">
        </div>
        <div class="color-row">
          ${COLORS.map((c, i) => `<div class="cdot${i === tl.colorIdx ? ' on' : ''}" style="background:${c}" title="${CNAMES[i]}" onclick="setTlColor(${tl.id},${i})"></div>`).join('')}
        </div>
        <button class="del-btn" onclick="removeTl(${tl.id})" aria-label="刪除此Timeline">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>
    <div class="node-col-head"><span></span><span>標籤</span><span>日期</span><span>節點色</span></div>
    <div class="node-rows">`;
    tl.nodes.forEach((nd, ni) => {
      const ph = phLabel(ni, tl.nodes.length);
      html += `<div class="node-row" draggable="true"
        ondragstart="onDragStart(event,${tl.id},${ni})"
        ondragend="onDragEnd(event)"
        ondragover="onDragOver(event,${tl.id},${ni})"
        ondrop="onDrop(event,${tl.id},${ni})">
        <div class="drag-handle" title="拖曳排序">
          <svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="1" fill="currentColor" stroke="none"/><circle cx="9" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="9" cy="17" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="7" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="17" r="1" fill="currentColor" stroke="none"/></svg>
        </div>
        <input class="node-inp" value="${esc(nd.label)}" placeholder="${ph}"
          oninput="setNode(${tl.id},${ni},'label',this.value)">
        <input type="date" class="node-inp" value="${nd.date}"
          onchange="setNode(${tl.id},${ni},'date',this.value)">
        <div class="color-row">
          ${COLORS.map((c, i) => `<div class="cdot${i === nd.color ? ' on' : ''}" style="background:${c};width:14px;height:14px" onclick="setNode(${tl.id},${ni},'color',${i})"></div>`).join('')}
        </div>
      </div>`;
    });
    html += `</div>`;
    card.innerHTML = html;
    cont.appendChild(card);
  });
}

function getVar(name) {
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim() ||
    getComputedStyle(document.body).getPropertyValue(name).trim();
}

function renderPreview() {
  const svg = document.getElementById('preview-svg');
  const textColor = isDark ? '#f0ede8' : '#1c1b18';
  const subColor  = isDark ? '#6b6760' : '#8a8680';
  const sepColor  = isDark ? '#2a2a2a' : '#e0dbd0';
  const bgColor   = isDark ? '#121212' : '#f8f7f4';

  if (!timelines.length) {
    svg.innerHTML = `<text y="28" x="0" font-size="13" font-family="DM Sans,sans-serif" fill="${subColor}">尚未新增 Timeline</text>`;
    svg.setAttribute('height', 40); return;
  }

  const W = svg.parentElement.clientWidth || 780;
  const TITLE_H = 24, ABOVE = 52, BELOW = 52, GAP = 28;
  const BLOCK_H = TITLE_H + ABOVE + BELOW;
  const totalH = timelines.length * (BLOCK_H + GAP) - GAP + 20;

  svg.setAttribute('viewBox', `0 0 ${W} ${totalH}`);
  svg.setAttribute('height', totalH);

  const PAD = 24;
  const TX1 = PAD, TX2 = W - PAD, TW = TX2 - TX1;
  let out = `<rect width="${W}" height="${totalH}" fill="${bgColor}" rx="0"/>`;

  timelines.forEach((tl, ti) => {
    const bY = ti * (BLOCK_H + GAP);
    const titleY = bY + 16;
    const trackY = bY + TITLE_H + ABOVE;

    if (ti > 0) {
      out += `<line x1="${PAD}" y1="${bY - GAP / 2}" x2="${W - PAD}" y2="${bY - GAP / 2}" stroke="${sepColor}" stroke-width="0.5" stroke-dasharray="4 3"/>`;
    }

    out += `<text x="${TX1}" y="${titleY}" font-family="DM Sans,sans-serif" font-size="11" font-weight="500" letter-spacing="0.04em" fill="${COLORS[tl.colorIdx]}" text-transform="uppercase">${esc(tl.name)}</text>`;

    const nodes = tl.nodes;
    const pd = nodes.map(n => n.date ? new Date(n.date) : null);
    const valid = pd.filter(Boolean);
    let minT = 0, maxT = 0, range = 0;
    if (valid.length >= 2) {
      minT = Math.min(...valid.map(d => d.getTime()));
      maxT = Math.max(...valid.map(d => d.getTime()));
      range = maxT - minT;
    }

    out += `<line x1="${TX1}" y1="${trackY}" x2="${TX2}" y2="${trackY}" stroke="${COLORS[tl.colorIdx]}" stroke-width="2" stroke-linecap="round"/>`;

    // ── Compute raw x positions ──
    const positions = nodes.map((nd, ni) => {
      if (range > 0 && pd[ni]) return TX1 + ((pd[ni].getTime() - minT) / range) * TW;
      return TX1 + (ni / Math.max(nodes.length - 1, 1)) * TW;
    });

    // ── Resolve label x positions ──
    // Head (ni=0) and tail (ni=last) are fixed — no collision handling needed.
    // Only middle nodes on the same side (above/below) may overlap each other.
    const EST_W = 7;   // estimated px per character
    const MIN_GAP = 8; // minimum px between adjacent label boxes on same side

    const lxMap = {};
    const last = nodes.length - 1;

    // Head and tail always fixed at their node x
    lxMap[0] = positions[0];
    if (last > 0) lxMap[last] = positions[last];

    // Collect middle nodes grouped by side
    const aboveMid = [], belowMid = [];
    nodes.forEach((nd, ni) => {
      if (ni === 0 || ni === last) return;
      const above = ni % 2 === 0;
      const label = nd.label || phLabel(ni, nodes.length);
      const w = Math.max(36, label.length * EST_W);
      (above ? aboveMid : belowMid).push({ ni, nx: positions[ni], lx: positions[ni], w });
    });

    // For middle nodes: only push apart neighbours that are too close
    function resolveMiddle(slots) {
      // sort by original x (should already be sorted, but just in case)
      slots.sort((a, b) => a.nx - b.nx);
      for (let i = 1; i < slots.length; i++) {
        const a = slots[i - 1], b = slots[i];
        const need = (a.w + b.w) / 2 + MIN_GAP;
        const gap = b.lx - a.lx;
        if (gap < need) {
          // push b to the right only — don't move a (it may already be settled)
          b.lx = a.lx + need;
        }
      }
      slots.forEach(s => { lxMap[s.ni] = s.lx; });
    }
    resolveMiddle(aboveMid);
    resolveMiddle(belowMid);

    // ── Draw nodes ──
    nodes.forEach((nd, ni) => {
      const nx = positions[ni];
      const lx = lxMap[ni] !== undefined ? lxMap[ni] : nx;
      const shifted = Math.abs(lx - nx) > 2;

      const above = ni % 2 === 0;
      const r = (ni === 0 || ni === nodes.length - 1) ? 6 : 4;
      const TICK = 8;
      const EXTRA = 18; // extra leader length when label is pushed
      const displayLabel = nd.label || phLabel(ni, nodes.length);

      out += `<circle cx="${nx}" cy="${trackY}" r="${r}" fill="${COLORS[nd.color]}" stroke="${bgColor}" stroke-width="2"/>`;

      if (above) {
        const baseTop = trackY - r - TICK;
        if (shifted) {
          // vertical stub from node, then diagonal leader to label column
          const leaderY = baseTop - EXTRA;
          out += `<line x1="${nx}" y1="${trackY - r}" x2="${nx}" y2="${baseTop}" stroke="${COLORS[nd.color]}" stroke-width="0.75" opacity="0.4"/>`;
          out += `<line x1="${nx}" y1="${baseTop}" x2="${lx}" y2="${leaderY}" stroke="${COLORS[nd.color]}" stroke-width="0.75" opacity="0.4"/>`;
          const dateY  = leaderY - 5;
          const labelY = dateY - 14;
          out += `<text x="${lx}" y="${labelY}" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" font-weight="500" fill="${textColor}">${esc(displayLabel)}</text>`;
          if (nd.date) {
            const d = new Date(nd.date);
            out += `<text x="${lx}" y="${dateY}" text-anchor="middle" font-family="'SF Mono','Consolas',monospace" font-size="10" fill="${subColor}">${d.getMonth()+1}/${d.getDate()}</text>`;
          }
        } else {
          out += `<line x1="${nx}" y1="${trackY - r}" x2="${nx}" y2="${baseTop}" stroke="${COLORS[nd.color]}" stroke-width="0.75" opacity="0.4"/>`;
          const dateY  = baseTop - 5;
          const labelY = dateY - 14;
          out += `<text x="${lx}" y="${labelY}" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" font-weight="500" fill="${textColor}">${esc(displayLabel)}</text>`;
          if (nd.date) {
            const d = new Date(nd.date);
            out += `<text x="${lx}" y="${dateY}" text-anchor="middle" font-family="'SF Mono','Consolas',monospace" font-size="10" fill="${subColor}">${d.getMonth()+1}/${d.getDate()}</text>`;
          }
        }
      } else {
        const baseBot = trackY + r + TICK;
        if (shifted) {
          const leaderY = baseBot + EXTRA;
          out += `<line x1="${nx}" y1="${trackY + r}" x2="${nx}" y2="${baseBot}" stroke="${COLORS[nd.color]}" stroke-width="0.75" opacity="0.4"/>`;
          out += `<line x1="${nx}" y1="${baseBot}" x2="${lx}" y2="${leaderY}" stroke="${COLORS[nd.color]}" stroke-width="0.75" opacity="0.4"/>`;
          const labelY = leaderY + 13;
          const dateY  = labelY + 13;
          out += `<text x="${lx}" y="${labelY}" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" font-weight="500" fill="${textColor}">${esc(displayLabel)}</text>`;
          if (nd.date) {
            const d = new Date(nd.date);
            out += `<text x="${lx}" y="${dateY}" text-anchor="middle" font-family="'SF Mono','Consolas',monospace" font-size="10" fill="${subColor}">${d.getMonth()+1}/${d.getDate()}</text>`;
          }
        } else {
          out += `<line x1="${nx}" y1="${trackY + r}" x2="${nx}" y2="${baseBot}" stroke="${COLORS[nd.color]}" stroke-width="0.75" opacity="0.4"/>`;
          const labelY = baseBot + 13;
          const dateY  = labelY + 13;
          out += `<text x="${lx}" y="${labelY}" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" font-weight="500" fill="${textColor}">${esc(displayLabel)}</text>`;
          if (nd.date) {
            const d = new Date(nd.date);
            out += `<text x="${lx}" y="${dateY}" text-anchor="middle" font-family="'SF Mono','Consolas',monospace" font-size="10" fill="${subColor}">${d.getMonth()+1}/${d.getDate()}</text>`;
          }
        }
      }
    });
  });

  out += `<text x="${W - PAD}" y="${totalH - 6}" text-anchor="end" font-family="DM Mono,monospace" font-size="9" fill="${subColor}" opacity="0.5" letter-spacing="0.05em">made by AD</text>`;
  svg.innerHTML = out;
}

function exportSVG() {
  const svg = document.getElementById('preview-svg');
  const serializer = new XMLSerializer();
  let src = serializer.serializeToString(svg);
  if (!src.includes('xmlns="http://www.w3.org/2000/svg"')) {
    src = src.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
  }
  const blob = new Blob([src], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'timeline-by-AD.svg';
  a.click();
  URL.revokeObjectURL(url);
}

function exportPNG() {
  const svg = document.getElementById('preview-svg');
  const vb = (svg.getAttribute('viewBox') || '').split(' ');
  const W = parseFloat(vb[2]) || svg.parentElement.clientWidth || 780;
  const H = parseFloat(svg.getAttribute('height')) || 300;
  const SCALE = 2;

  // Serialize SVG — use only system fonts so Canvas is never tainted
  const serializer = new XMLSerializer();
  let src = serializer.serializeToString(svg);
  if (!src.includes('xmlns=')) src = src.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');

  // Encode as data URI (avoids Blob URL CORS issue in some browsers)
  const encoded = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(src);

  const img = new Image();
  img.onload = function () {
    const canvas = document.createElement('canvas');
    canvas.width  = Math.ceil(W * SCALE);
    canvas.height = Math.ceil(H * SCALE);
    const ctx = canvas.getContext('2d');
    ctx.scale(SCALE, SCALE);
    ctx.drawImage(img, 0, 0, W, H);
    try {
      const a = document.createElement('a');
      a.download = 'timeline-by-AD.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
      showToast('PNG 已匯出 ✓');
    } catch (e) {
      showToast('PNG 匯出失敗，請用 SVG');
    }
  };
  img.onerror = () => showToast('圖片載入失敗，請用 SVG');
  img.src = encoded;
}

// ── Share link ──
function encodeState() {
  const data = {
    dark: isDark,
    tls: timelines.map(tl => ({
      id: tl.id,
      name: tl.name,
      colorIdx: tl.colorIdx,
      nodes: tl.nodes.map(n => ({ label: n.label, date: n.date, color: n.color }))
    })),
    count: tlCount
  };
  return btoa(encodeURIComponent(JSON.stringify(data)));
}

function decodeState(hash) {
  try {
    return JSON.parse(decodeURIComponent(atob(hash)));
  } catch (e) { return null; }
}

function openShareModal() {
  const encoded = encodeState();
  const base = location.href.split('#')[0];
  // If running locally as file://, show a notice; on Vercel it will be full HTTPS URL
  const url = base.startsWith('file:')
    ? '[ 部署到 Vercel 後才能使用分享連結 ]  hash: ' + encoded
    : base + '#' + encoded;
  document.getElementById('shareUrlInput').value = url;
  document.getElementById('shareModal').classList.add('open');
}

function closeShareModal() {
  document.getElementById('shareModal').classList.remove('open');
}

function copyShareUrl() {
  const input = document.getElementById('shareUrlInput');
  const text = input.value;
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => {
      closeShareModal();
      showToast('連結已複製到剪貼簿 ✓');
    }).catch(() => fallbackCopy(input, text));
  } else {
    fallbackCopy(input, text);
  }
}
function fallbackCopy(input, text) {
  input.removeAttribute('readonly');
  input.select();
  input.setSelectionRange(0, 99999);
  const ok = document.execCommand('copy');
  input.setAttribute('readonly', '');
  closeShareModal();
  showToast(ok ? '連結已複製 ✓' : '請手動複製上方連結');
}

// ── Toast ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Load from hash on startup ──
function loadFromHash() {
  const hash = location.hash.slice(1);
  if (!hash) return false;
  const data = decodeState(hash);
  if (!data || !data.tls) return false;
  timelines = data.tls.map(tl => ({
    id: tl.id,
    name: tl.name,
    colorIdx: tl.colorIdx,
    nodes: tl.nodes.map(n => ({ label: n.label || '', date: n.date || '', color: n.color }))
  }));
  tlCount = data.count || timelines.length;
  if (data.dark) {
    isDark = true;
    document.body.classList.add('dark');
    document.getElementById('themeIcon').innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
  renderAll();
  showToast('已從分享連結載入資料');
  return true;
}

// Init
if (!loadFromHash()) {
  addTimeline(4);
}
updateDupMenu();
window.addEventListener('resize', renderPreview);
